name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # в”Ђв”Ђ Tests (runs on every push/PR) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: pip install monitorcontrol pytest
      - name: Run tests
        run: pytest tests/ -v

  # в”Ђв”Ђ Windows build (runs on tags and manual dispatch) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build-windows:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Stamp version and repo into binary
        shell: python
        run: |
          import pathlib
          pathlib.Path('src/version.py').write_text(
              '__version__ = "${{ steps.ver.outputs.version }}"\n'
              'GITHUB_REPO = "${{ github.repository }}"\n'
          )

      - name: Build exe with PyInstaller
        run: pyinstaller ScreenSwitchWidget-win.spec

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.ver.outputs.version }} installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/ScreenSwitchWidget-*-Setup.exe
          if-no-files-found: error

  # в”Ђв”Ђ Linux build (runs on tags and manual dispatch) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build-linux:
    needs: test
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries required by PySide6
        run: sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Stamp version and repo into binary
        shell: python
        run: |
          import pathlib
          pathlib.Path('src/version.py').write_text(
              '__version__ = "${{ steps.ver.outputs.version }}"\n'
              'GITHUB_REPO = "${{ github.repository }}"\n'
          )

      - name: Build binary with PyInstaller
        run: pyinstaller ScreenSwitchWidget.spec

      - name: Package
        id: pkg
        run: |
          TARBALL="ScreenSwitchWidget-${{ steps.ver.outputs.version }}-linux.tar.gz"
          tar czf "$TARBALL" -C dist ScreenSwitchWidget
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: ${{ steps.pkg.outputs.tarball }}
          if-no-files-found: error

  # в”Ђв”Ђ GitHub Release (runs only on version tags) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ScreenSwitchWidget-*-Setup.exe
            ScreenSwitchWidget-*-linux.tar.gz
          generate_release_notes: true
